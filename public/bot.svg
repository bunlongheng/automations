<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Antenna -->
  <line x1="100" y1="8" x2="100" y2="35" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="6" r="6" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <!-- Head -->
  <rect x="40" y="35" width="120" height="80" rx="36" fill="#f0f0f0" stroke="#333" stroke-width="3"/>
  <!-- Face visor -->
  <rect x="52" y="48" width="96" height="54" rx="24" fill="#1a1a1a"/>
  <!-- Eyes -->
  <circle cx="78" cy="72" r="10" fill="#fff"/>
  <circle cx="78" cy="72" r="5" fill="#1a1a1a"/>
  <circle cx="122" cy="72" r="10" fill="#fff"/>
  <circle cx="122" cy="72" r="5" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="75" cy="69" r="2.5" fill="#fff" opacity="0.8"/>
  <circle cx="119" cy="69" r="2.5" fill="#fff" opacity="0.8"/>
  <!-- Smile -->
  <path d="M88 84 Q100 94 112 84" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Ears -->
  <circle cx="35" cy="75" r="10" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <circle cx="165" cy="75" r="10" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <!-- Body -->
  <rect x="55" y="120" width="90" height="60" rx="16" fill="#f0f0f0" stroke="#333" stroke-width="3"/>
  <!-- Chest icon -->
  <rect x="82" y="137" width="36" height="26" rx="4" fill="#1a1a1a"/>
  <rect x="88" y="143" width="6" height="6" rx="1" fill="#fff"/>
  <rect x="97" y="143" width="6" height="6" rx="1" fill="#fff"/>
  <rect x="106" y="143" width="6" height="6" rx="1" fill="#fff"/>
  <rect x="91" y="152" width="6" height="6" rx="1" fill="#fff"/>
  <rect x="100" y="152" width="6" height="6" rx="1" fill="#fff"/>
  <!-- Arms -->
  <rect x="25" y="125" width="26" height="12" rx="6" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <rect x="149" y="125" width="26" height="12" rx="6" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <!-- Left hand waving -->
  <g transform="rotate(-20, 25, 131)">
    <circle cx="18" cy="125" r="8" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
    <line x1="10" y1="118" x2="8" y2="110" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="116" x2="13" y2="108" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="116" x2="18" y2="108" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="22" y1="118" x2="23" y2="110" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Legs -->
  <rect x="68" y="182" width="22" height="28" rx="8" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <rect x="110" y="182" width="22" height="28" rx="8" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <!-- Feet -->
  <rect x="60" y="206" width="36" height="16" rx="8" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <rect x="104" y="206" width="36" height="16" rx="8" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
</svg>
